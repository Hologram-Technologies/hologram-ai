[workspace]
resolver = "2"
members = [
    "crates/hologram-ai",
    "crates/hologram-ai-onnx",
    #"crates/hologram-ai-gguf",
    #"crates/hologram-ai-safetensors",
    "crates/hologram-ai-common",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/uor-framework/hologram-ai"

[workspace.dependencies]
# Hologram - using local categorical-x workspace at /workspace
hologram = { path = "/hologram" }

# Internal crates
hologram-ai-common = { path = "crates/hologram-ai-common" }
hologram-ai-onnx = { path = "crates/hologram-ai-onnx" }
hologram-ai-gguf = { path = "crates/hologram-ai-gguf" }
hologram-ai-safetensors = { path = "crates/hologram-ai-safetensors" }

# Protobuf
prost = "0.13"
prost-types = "0.13"
bytes = "1"

# Core dependencies
thiserror = "2.0"
anyhow = "1.0"
bytemuck = { version = "1.14", features = ["derive"] }
ahash = "0.8"
rustc-hash = "2.0"
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
petgraph = "0.6"
rayon = "1.10"
half = "2.3"
rkyv = { version = "0.8", features = ["pointer_width_64"] }
libc = "0.2"
unicode-normalization = "0.1"

# CLI dependencies
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", features = ["blocking", "json"] }
indicatif = "0.17"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tempfile = "3.8"

# Feature-gated output handlers
image = "0.25"
hound = "3.5"
tokenizers = "0.20"

# Testing
criterion = { version = "0.5", features = ["html_reports"] }
