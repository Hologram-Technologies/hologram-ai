[package]
name = "hologram-onnx"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/uor-framework/hologram-onnx"
description = "Production ONNX runtime for hologram with full ISA optimization support"
readme = "README.md"
keywords = [
    "onnx",
    "hologram",
    "machine-learning",
    "neural-network",
    "compiler",
]
categories = ["science", "machine-learning"]

[[bin]]
name = "hologram-onnx"
path = "src/main.rs"

[dependencies]
# Hologram dependencies (local paths)
hologram-ir = { path = "/hologram/crates/ir" }
hologram-compiler = { path = "/hologram/crates/compiler" }
hologram-core = { path = "/hologram/crates/core" }
hologram-backend = { path = "/hologram/crates/backend" }

# Protobuf
prost = "0.13"
prost-types = "0.13"
bytes = "1"

# Core dependencies
thiserror = "2.0"
anyhow = "1.0"
bytemuck = { version = "1.14", features = ["derive"] }
ahash = "0.8"
rustc-hash = "2.0"
tracing = "0.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
petgraph = "0.6"
rayon = "1.10"
half = "2.3"  # f16 support
rkyv = "0.8"

# Runtime execution
ndarray = "0.16"
matrixmultiply = "0.3"

# CLI dependencies
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", features = ["blocking", "json"] }
indicatif = "0.17"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Feature-gated output handlers
image = { version = "0.25", optional = true }
hound = { version = "3.5", optional = true }
tokenizers = { version = "0.20", optional = true }

[build-dependencies]
prost-build = "0.13"

[dev-dependencies]
tempfile = "3.8"
criterion = { version = "0.5", features = ["html_reports"] }

[features]
default = []
image-output = ["dep:image"]
audio-output = ["dep:hound"]
text-output = ["dep:tokenizers"]
all-outputs = ["image-output", "audio-output", "text-output"]

[patch."https://github.com/UOR-Foundation/hologram-backend.git"]
hologram-backend = { path = "/hologram/crates/backend" }

[[bench]]
name = "conv_bench"
harness = false

[[bench]]
name = "shape_bench"
harness = false

[[bench]]
name = "compilation_bench"
harness = false

[[bench]]
name = "execution_bench"
harness = false

[[bench]]
name = "compilation_benchmarks"
harness = false
