services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git-cache:/usr/local/cargo/git
      # Mount host SSH directory (read-only)
      - ${HOME}/.ssh:/home/vscode/.ssh-host:ro
    working_dir: /workspace
    command: sleep infinity
    privileged: true
    cap_add:
      - SYS_ADMIN
    stdin_open: true
    tty: true
    environment:
      - RUST_BACKTRACE=1
      - CARGO_TERM_COLOR=always
      - RUST_LOG=info
    # Memory limits for ONNX compiler
    deploy:
      resources:
        limits:
          memory: 64G  # 64GB max (for compiler-heavy workloads)
        reservations:
          memory: 16G  # 16GB reserved

volumes:
  cargo-cache:
  cargo-git-cache:
