# TinyLlama 1.1B Chat — Q4-quantized compile + generate.
#
# hologram-ai uses explicit CLI flags (there is no `--config` mode). The fields
# below are reference values; the exact commands are:
#
# Download (lays out model.onnx + tokenizer.json under models/…):
#   cargo run --release -- download TinyLlama/TinyLlama-1.1B-Chat-v1.0
#
# Compile (model.onnx → model.holo; q4_0 keeps weights packed at ~½ byte/param):
#   cargo run --release -- compile \
#     --model models/TinyLlama-1.1B-Chat-v1.0/model.onnx \
#     --output models/TinyLlama-1.1B-Chat-v1.0 \
#     --quantize q4_0
#
# Generate (the tokenizer is supplied at run time — the .holo carries no
# tokenizer section; greedy decoding at temperature 0):
#   cargo run --release -- run models/TinyLlama-1.1B-Chat-v1.0/model.holo \
#     --prompt "The capital of France is" \
#     --tokenizer models/TinyLlama-1.1B-Chat-v1.0/tokenizer.json \
#     --prompt-template "<|user|>\n{prompt}</s>\n<|assistant|>\n" \
#     --max-tokens 60 --stop "</s>"
#
# STATUS: compile + a full forward pass are verified end-to-end on real
# Llama-family ONNX (the authoritative onnx-community SmolLM2-135M runs through
# the canonical OpKind pipeline — embedding Gather, causal grouped-query
# attention, RoPE, RMSNorm, SwiGLU, LM head). int64 `input_ids` work via the
# first-class `Gather` (no i8≤127 limit).
#
# The greedy/sampled generation loop is verified end-to-end — see the runnable
# `cargo run -p hologram-ai --example text_generation` (deterministic, checked
# against a closed-form expectation) and `tests/generation_synthetic.rs`.
#
# Generating from a *pretrained* checkpoint additionally needs a **no-past**
# forward export: hologram-ai replaces the mutable KV-cache with content-addressed
# κ-label elision, so `run --prompt` recomputes the growing token window and
# reuses the unchanged prefix by content address. The default HF/onnx-community
# exports are *with-past decode-step* graphs (input_ids[1,1] + past KV per step),
# which `generate_stream` does not drive; converting such a graph to its no-past
# recompute form is the remaining step for one-command real-LM chat.

[model]
hf_id = "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
quantize = "q4_0"

[run]
prompt = "The capital of France is"
prompt_template = "<|user|>\n{prompt}</s>\n<|assistant|>\n"
max_tokens = 60
temperature = 0.0
stop = ["</s>"]
