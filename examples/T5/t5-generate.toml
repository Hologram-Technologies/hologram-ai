# T5 Text Generation Configuration
#
# This config is used to run text generation with precompiled T5 models.
# Usage: hologram-ai run --config configs/t5-generate.toml

name = "T5 Text Generation"
description = "Generate text using T5-small encoder-decoder model"

# Input prompt
[inputs]
prompt = "translate English to French: Hello, how are you?"

# Tokenizer configuration
[tokenizer]
type = "sentencepiece"
vocab_path = "/workspace/models/t5-small/tokenizer.json"
max_length = 512
pad_token_id = 0
eos_token_id = 1
unk_token_id = 2

# Precompiled models (output from t5-compile.toml)
[models.encoder]
precompiled = "/workspace/models/t5-small/compiled/encoder.holo"

[models.decoder]
precompiled = "/workspace/models/t5-small/compiled/decoder.holo"

# Generation parameters
[generation]
max_new_tokens = 50
start_token_id = 0
temperature = 1.0
top_k = 50
top_p = 0.9
do_sample = false  # Greedy decoding by default

# Pipeline stages
[[stages]]
type = "builtin"
builtin = "tokenize"
outputs = ["input_ids", "attention_mask"]

[stages.args]
text = "prompt"
max_length = 512
tokenizer_path = "/workspace/models/t5-small/tokenizer.json"

[[stages]]
type = "model"
model = "encoder"
inputs = { input_ids = "input_ids", attention_mask = "attention_mask" }
outputs = ["encoder_hidden_states"]

[[stages]]
type = "builtin"
builtin = "generate"
outputs = ["generated_ids"]

[stages.args]
model = "decoder"
encoder_hidden_states = "encoder_hidden_states"
encoder_attention_mask = "attention_mask"
max_new_tokens = 50
start_token_id = 0

[[stages]]
type = "builtin"
builtin = "decode"
outputs = ["generated_text"]

[stages.args]
tokens = "generated_ids"

# Output configuration
[outputs.result]
tensor = "generated_text"
handler = "text"
description = "Generated text"
