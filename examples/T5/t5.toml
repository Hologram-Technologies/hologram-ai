# T5 Unified Configuration
#
# This single config file supports both:
# 1. Compilation: hologram-ai compile --config configs/t5.toml
# 2. Execution: hologram-ai run --config configs/t5.toml
#
# Usage:
#
# Compile models:
#   hologram-ai compile /workspace/models/t5-small/encoder_model.onnx \
#     --output /workspace/models/t5-small/compiled/encoder.holo
#   hologram-ai compile /workspace/models/t5-small/decoder_model.onnx \
#     --output /workspace/models/t5-small/compiled/decoder.holo
#
# Run generation:
#   hologram-ai run --config configs/t5.toml
#
# Override prompt:
#   hologram-ai run --config configs/t5.toml --prompt "Your custom prompt"

name = "T5 Small"
description = "Unified T5-small configuration for compilation and execution"

# ============================================================================
# Tokenizer Configuration (shared by compilation and execution)
# ============================================================================
[tokenizer]
type = "sentencepiece"
path = "/workspace/models/t5-small/tokenizer.json"
vocab_path = "/workspace/models/t5-small/tokenizer.json"  # Alias for execution
max_length = 512
pad_token_id = 0
eos_token_id = 1
unk_token_id = 2

# ============================================================================
# Model Paths (both ONNX source and compiled output)
# ============================================================================
[models.encoder]
# Source ONNX file (for compilation)
path = "/workspace/models/t5-small/encoder_model.onnx"
onnx_path = "/workspace/models/t5-small/encoder_model.onnx"  # Explicit alias

# Compiled output (for execution)
output = "/workspace/models/t5-small/compiled/encoder.holo"
precompiled = "/workspace/models/t5-small/compiled/encoder.holo"  # Alias for execution

[models.decoder]
# Source ONNX file (for compilation)
path = "/workspace/models/t5-small/decoder_model.onnx"
onnx_path = "/workspace/models/t5-small/decoder_model.onnx"  # Explicit alias

# Compiled output (for execution)
output = "/workspace/models/t5-small/compiled/decoder.holo"
precompiled = "/workspace/models/t5-small/compiled/decoder.holo"  # Alias for execution

# ============================================================================
# Compilation Settings
# ============================================================================
[compilation]
# Note: Compilation automatically:
# - Auto-selects weight strategy based on model size:
#   * < 100MB: Embedded in .holo file
#   * 100MB-1GB: Page-aligned section (memory-mapped)
#   * > 1GB: Separate .weights file
# - Enables ONNX shape inference (critical for T5 dynamic shapes)
# - Applies Hologram optimizations (SIMD, epilogue fusion, parallel execution)
weight_strategy = "auto"
shape_inference = true
enable_optimizations = true

# ============================================================================
# Generation Settings (for execution)
# ============================================================================
[inputs]
prompt = "translate English to French: Hello, how are you?"

[generation]
max_new_tokens = 50
start_token_id = 0
temperature = 1.0
top_k = 50
top_p = 0.9
do_sample = false  # Greedy decoding by default (set true for sampling)

# ============================================================================
# Pipeline Stages (defines execution flow)
# ============================================================================

# Stage 1: Tokenize input text
[[stages]]
type = "builtin"
builtin = "tokenize"
outputs = ["input_ids", "attention_mask"]

[stages.args]
text = "prompt"
max_length = 512
tokenizer_path = "/workspace/models/t5-small/tokenizer.json"

# Stage 2: Run encoder
[[stages]]
type = "model"
model = "encoder"
inputs = { input_ids = "input_ids", attention_mask = "attention_mask" }
outputs = ["encoder_hidden_states"]

# Stage 3: Generate tokens autoregressively
[[stages]]
type = "builtin"
builtin = "generate"
outputs = ["generated_ids"]

[stages.args]
model = "decoder"
encoder_hidden_states = "encoder_hidden_states"
encoder_attention_mask = "attention_mask"
max_new_tokens = 50
start_token_id = 0

# Stage 4: Decode tokens to text
[[stages]]
type = "builtin"
builtin = "decode"
outputs = ["generated_text"]

[stages.args]
tokens = "generated_ids"

# ============================================================================
# Output Configuration
# ============================================================================
[outputs.result]
tensor = "generated_text"
handler = "text"
description = "Generated text"

# ============================================================================
# Example Prompts for T5
# ============================================================================
#
# Translation:
#   prompt = "translate English to French: The weather is beautiful today"
#   prompt = "translate English to German: I love programming"
#   prompt = "translate French to English: Bonjour, comment allez-vous?"
#
# Summarization:
#   prompt = "summarize: Large language models are neural networks..."
#
# Question Answering:
#   prompt = "question: What is the capital of France? context: France is a country in Europe. Its capital is Paris."
#
# Grammar Correction:
#   prompt = "grammar: She go to school yesterday"
#
# General Text Generation:
#   prompt = "Tell me a joke"
#   prompt = "Write a poem about the ocean"
#   prompt = "Explain quantum computing in simple terms"
