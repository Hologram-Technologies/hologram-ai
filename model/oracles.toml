# The oracle registry: every authoritative external source a witness may
# validate against. Committed artifacts carry provenance + a sha256 verified by
# `xtask oracle-verify` (offline); pinned upstreams are confirmed live by
# `xtask pin-check` (online). Kinds:
#   official-test-vectors    — a standards body / project's published KATs, committed
#   golden-vectors           — committed vectors reproducing an external reference
#   generated-fixture        — committed inputs whose *authority* is elsewhere (integrity-tracked)
#   deterministic-reference  — committed outputs of a seeded, reproducible derivation
#   live-authority           — a live external system exercised at a pinned revision
#   reference-implementation — an external reference library the suite diffs against
#   substrate-witness        — the pinned substrate's own V&V surface

[[oracle]]
id = "blake3-kats"
authority = "BLAKE3 — official test vectors"
source = "https://github.com/BLAKE3-team/BLAKE3"
pin = "master:test_vectors/test_vectors.json"
license = "CC0-1.0 OR Apache-2.0"
kind = "official-test-vectors"
note = "κ-addressing is `blake3:<hex>` of content; the KATs anchor the hash itself."

[[oracle.artifacts]]
path = "oracles/blake3/test_vectors.json"
sha256 = "dcb91ea8accc77e6d6e632af7cdc1a99a9f3ae78cf648da595c7d064db32f624"

