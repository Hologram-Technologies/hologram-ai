# ───────────────────────────── S3 — execution ─────────────────────────────

[[row]]
id = "staged-execution"
statement = "Windowed execution over k equals monolithic execution: the stage archives' κ-maps partition the model's tensors exactly, the staged pipeline reproduces the monolithic logits, and peak weight residency is bounded by the window, never the model."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/staged_execution.feature"

[[row]]
id = "staged-window-growth"
statement = "The staged generation window follows the sequence, never the model: stage k-forms are weightless, so the session recompiles them per geometric window bucket up to the model's own context, per-token compute scales with the actual sequence, the regrown pipeline reproduces the fixed-window completion exactly, and a sequence past the model's context fails loud naming both lengths."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/staged_window_growth.feature"

[[row]]
id = "stage-residency-cache"
statement = "κ-store bandwidth is paid per window, never per token, within the environment's measured headroom: materialized stage sessions stay resident across forward passes while they fit the residency budget, each stage materializes once per window, the resident set never exceeds the budget (one stage is the floor), and a zero budget is exactly the strict one-stage window; cached and strict execution produce identical completions."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/stage_residency_cache.feature"

[[row]]
id = "session-verified-kappa"
statement = "Verification is placed at the trust boundary, once per crossing, never per traversal: a κ verifies (re-hashes) at its first materialization in a session and later rematerializations are read-only I/O; the verified set is session-scoped, so a fresh session re-verifies at first touch and rejects corrupted content naming the label."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/session_verified_kappa.feature"

[[row]]
id = "total-algebraic-path"
statement = "Every executed kernel is a hierarchy kernel — zero runtime float dispatch, parity with the retired float reference witnessed at gate time per (op, tier); held open by the pinned substrate's float-first dispatch for float dtypes, with the float-dispatch fraction of a compiled plan measured and reported, never asserted."
stage = "S3"
status = "open"
oracles = ["hologram-substrate"]
tier = "target"
executor = "rust"
feature = "features/suites/s3_execution/total_algebraic_path.feature"

[[row]]
id = "saturation-residency"
statement = "A failed verification UNPINS: the corrupted cache entry evaporates and resolution re-resolves once through the deeper tier (recorded provenance), so cache corruption degrades to a stream instead of dead-ending the journey; only the failing entry is evicted — every other cached κ (bound content) is untouched; without a deeper tier the failure stays loud naming the label, and recovered bytes must reproduce the κ before anything executes."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/saturation_residency.feature"

[[row]]
id = "derived-artifact-kappa"
statement = "The known set closes over deterministic derivation: a window's stage archives persist under their derivation key with recorded content-κs, a later session with identical inputs resolves them (content-verified at load) instead of re-deriving, resolution and derivation are output-identical, and a corrupted entry evaporates with derivation itself as the recovery — a wrong prior never dead-ends and never executes unverified content."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/derived_artifact_kappa.feature"

[[row]]
id = "idle-derivation"
statement = "Idle time feeds the anneal: between turns the session pre-derives the next window bucket's stage archives into the derived store — off the per-token path (no weights move, the resident window and its counters are untouched) — so a later bucket crossing resolves the window instead of compiling it on the critical path; abandoned speculation is ordinary derived content, evaporable by the same lifecycle; failed speculation is inert, never load-bearing."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/idle_derivation.feature"

[[row]]
id = "single-position-head"
statement = "The head computes only the position the sampler consumes: the pipeline gathers the consumed position's hidden state after the final norm (a runtime last_pos input the generation loop synthesizes by name, like every auxiliary), so per-step head cost is O(vocab·d) never O(window·vocab·d), the whole and chunked heads emit the same gathered form, staged equals monolithic through the gather, and greedy completions are unchanged by construction."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/single_position_head.feature"

[[row]]
id = "lazy-constant-residency"
statement = "The weight tier pages: a k-form archive loads against a κ-store provider with a residency budget instead of copying every weight resident — whole-κ weight constants become by_reference fingerprints (the fingerprint IS the κ's content digest, so the slot's label and every derivation key equal the fully-resident path's) that page in on first use and evict cold under the budget, verified once per κ per session at the trust boundary; the arena is a bounded window over the provider rather than a full copy, so peak resident weight bytes stay under the budget across a whole decode while the logits are byte-identical to the fully-resident load — residency is orthogonal to identity, the weight-tier analog of sub-tensor κ-resolution."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/lazy_constant_residency.feature"

[[row]]
id = "decode-plan"
statement = "The per-token pass computes one position: the decoder recipe emitted at seq = 1 with every fused attention node decomposed into masked past-attention over a fixed bucket of carried K/V rows — carried K/V is derived content through named ports (past_k/past_v in, k_new/v_new out, the engine splices each step's rows between steps), positions are runtime data (rope tables synthesized at the absolute position, an additive mask erasing unrealized bucket rows), one compiled artifact serves every step, bucket exhaustion is a geometric recompile never a ceiling, every step's logits match the whole-window plan at that position, and the carried rows persist across turns: a prompt extending the session's realized sequence rewinds to the shared prefix and steps only its novel suffix, indistinguishable from a fresh replay."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/decode_plan.feature"

[[row]]
id = "chunked-prefill"
statement = "Prefill amortizes the weight stream across a chunk: the decode plan generalized to seq = C emits C positions per pass over the same carried bucket (intra-chunk causality enters through the same additive mask that erases unrealized rows; rope tables arrive pre-expanded to the plan's head-major layout), a prompt suffix seeds in ceil(n/C) passes instead of n, a partial final chunk pads with rows that land above the realized length where the mask makes them unreachable until overwritten, and a chunk-seeded session is indistinguishable from a step-fed one at the sampler row and at every subsequent position."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/chunked_prefill.feature"

[[row]]
id = "speculative-decode"
statement = "A draftable stretch is decoded in batches without changing the output: the next tokens are drafted from the realized sequence's own recurrence (the tokens that followed the current suffix's most recent earlier occurrence — zero weights, no draft model), verified in ONE M=K pass whose head emits logits at every drafted position (the substrate's efficient batched matmul shape, not K single-position steps), and only the longest prefix the model would itself greedily produce is accepted — its K/V spliced from that same pass and one correcting bonus token committed — so the greedy completion is byte-identical to single-position decode. No recurrence means an empty draft and a plain step (never worse); a draft that verifies commits several tokens per two passes, so over a recurring stretch the forward-pass count falls below the token count. No unverified token is ever emitted."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/speculative_decode.feature"

[[row]]
id = "quantized-rest"
statement = "A quant-tiered model rests quantized: the download derives each fully-retirable projection's matmul-ready int8 artifact in the browser and evaporates its wide blob — the wide form transits once and rests nowhere (recorded provenance keeps it recoverable; a missing artifact re-derives at session warm, fail-closed on its recorded κ) — the κ-store holds the quantized form, and the chat journey completes on it with the tier stated in the narration, never silently."
stage = "S1"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "browser"
feature = "features/suites/s1_acquisition/quantized_rest.feature"

[[row]]
id = "quantized-transit"
statement = "A quantized weight form is derived content: computed deterministically from the wide tensor's κ (re-derivation reproduces the artifact κ bit-identically), addressed by its own κ, stored matmul-ready and bound by stage graphs as two ranged sub-tensor κ-bindings feeding Dequantize adjacent to its MatMul; once the derivation crystallizes the wide blob goes gas-phase — with wide content evicted the pipeline still generates and never resolves a wide projection κ — and the quantized staged pipeline generates identically to the quantized monolithic archive; quantized-vs-wide quality is measured, never asserted."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/quantized_transit.feature"

[[row]]
id = "chunked-head"
statement = "No head is too large to execute: the LM head partitions into vocab-row chunks at the pipeline's own stage granularity via κ-range bindings (a chunk binds a byte range of the whole tensor's κ; verification covers the whole content once, and it is the only whole-content read — a session-verified ranged binding rematerializes through resolve_range, moving only its slice), the concatenated chunk logits agree with the whole-head logits within kernel reduction-order tolerance with exact greedy-decode parity, no whole-vocabulary image is ever materialized, and a single-chunk head is exactly the classic head stage."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/chunked_head.feature"

[[row]]
id = "bounded-embedding"
statement = "A model is bounded by its unavoidable per-row/per-tile work, never whole-matrix F32 materialization: the embedding gathers the token rows at the table's native dtype and widens only the gathered result, so the whole [vocab, hidden] F32 image is never materialized, and a fused Phi3-family model executes monolithically and staged to identical logits."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/bounded_embedding.feature"

