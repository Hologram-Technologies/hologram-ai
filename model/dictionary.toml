# The hologram-ai dictionary, transcribed row-by-row from
# docs/conceptual-model/00-source.md. This is the single source of truth the BDD
# features and V&V witnesses are checked against by the honesty meta-gate.
#
# Fields:
#   id        kebab-case row identifier (matches the feature tag @row:<id>)
#   statement the one-line normative claim
#   stage     S0 addressing | S1 acquisition | S2 compilation | S3 execution | S4 application
#   status    verified | build | open           (see model/status.toml)
#   oracles   ids from model/oracles.toml
#   tier      suite  = implemented, gating, green
#             target = defined behavior, measured/probed, non-gating
#   executor  rust    = cucumber (hologram-ai-conformance)
#             browser = cucumber-js + Playwright Chromium (apps/web/bdd)
#   feature   path (relative to repo root) of the Gherkin definition

# ───────────────────────────── S0 — addressing ─────────────────────────────

[[row]]
id = "kappa-addressing"
statement = "A buffer's κ-label is `blake3:<hex>` of its bytes, reproducing the official BLAKE3 vectors and `holospaces::address`."
stage = "S0"
status = "verified"
oracles = ["blake3-kats", "holospaces-substrate"]
tier = "suite"
executor = "rust"
feature = "features/suites/s0_addressing/kappa_addressing.feature"

[[row]]
id = "chunked-kappa-persisting"
statement = "Incremental (chunked) κ-hashing of a stream equals the one-shot κ of the whole content, for every chunking."
stage = "S0"
status = "verified"
oracles = ["blake3-kats"]
tier = "suite"
executor = "rust"
feature = "features/suites/s0_addressing/chunked_kappa_persisting.feature"

[[row]]
id = "content-verified-resolution"
statement = "Resolving κ → bytes re-hashes the bytes; content that does not reproduce its κ is rejected with the label."
stage = "S0"
status = "build"
oracles = ["blake3-kats"]
tier = "suite"
executor = "rust"
feature = "features/suites/s0_addressing/content_verified_resolution.feature"

