# ───────────────────────────── S3 — execution ─────────────────────────────

[[row]]
id = "staged-execution"
statement = "Windowed execution over k equals monolithic execution: the stage archives' κ-maps partition the model's tensors exactly, the staged pipeline reproduces the monolithic logits, and peak weight residency is bounded by the window, never the model."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/staged_execution.feature"

[[row]]
id = "staged-window-growth"
statement = "The staged generation window follows the sequence, never the model: stage k-forms are weightless, so the session recompiles them per geometric window bucket up to the model's own context, per-token compute scales with the actual sequence, the regrown pipeline reproduces the fixed-window completion exactly, and a sequence past the model's context fails loud naming both lengths."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/staged_window_growth.feature"

[[row]]
id = "stage-residency-cache"
statement = "κ-store bandwidth is paid per window, never per token, within the environment's measured headroom: materialized stage sessions stay resident across forward passes while they fit the residency budget, each stage materializes once per window, the resident set never exceeds the budget (one stage is the floor), and a zero budget is exactly the strict one-stage window; cached and strict execution produce identical completions."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/stage_residency_cache.feature"

[[row]]
id = "session-verified-kappa"
statement = "Verification is placed at the trust boundary, once per crossing, never per traversal: a κ verifies (re-hashes) at its first materialization in a session and later rematerializations are read-only I/O; the verified set is session-scoped, so a fresh session re-verifies at first touch and rejects corrupted content naming the label."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/session_verified_kappa.feature"

[[row]]
id = "bounded-embedding"
statement = "A model is bounded by its unavoidable per-row/per-tile work, never whole-matrix F32 materialization: the embedding gathers the token rows at the table's native dtype and widens only the gathered result, so the whole [vocab, hidden] F32 image is never materialized, and a fused Phi3-family model executes monolithically and staged to identical logits."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/bounded_embedding.feature"

[[row]]
id = "kappa-provenance-resolution"
statement = "The κ-store is a cache over recorded provenance: a κ absent from the local store resolves from its revision-pinned source (verified by re-hashing to its κ), and the journey completes with an empty local cache — local and remote resolution are indistinguishable."
stage = "S3"
status = "build"
oracles = ["journey-reference"]
tier = "suite"
executor = "browser"
feature = "features/suites/s3_execution/kappa_provenance_resolution.feature"

[[row]]
id = "kappa-materialization"
statement = "A k-form archive + a κ-store materialize into an executable session; every resolve is content-verified; a missing or corrupt κ aborts with the label."
stage = "S3"
status = "build"
oracles = ["blake3-kats"]
tier = "suite"
executor = "rust"
feature = "features/suites/s3_execution/kappa_materialization.feature"

