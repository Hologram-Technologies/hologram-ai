# T5 Text Generation Pipeline
#
# Full encoder-decoder pipeline with auto-regressive generation
#
# Usage:
#   cargo run --release -- run --config configs/t5-generate.toml

name = "T5 Text Generation"
description = "End-to-end text generation with T5"

# Input
[inputs]
# Prompt for text generation
prompt = "Tell me a joke in English"

# Tokenizer configuration
[tokenizer]
type = "sentencepiece"
vocab_path = "/workspace/models/t5-small/tokenizer.json"
max_length = 512
pad_token_id = 0
eos_token_id = 1
unk_token_id = 2

# Models
[models.encoder]
path = "/workspace/models/t5-small/encoder_model.onnx"
precompiled = "/workspace/models/t5-small/compiled/encoder.holo"

[models.decoder]
path = "/workspace/models/t5-small/decoder_model.onnx"
precompiled = "/workspace/models/t5-small/compiled/decoder.holo"

# Pipeline stages
[[stages]]
type = "builtin"
builtin = "tokenize"
outputs = ["input_ids", "attention_mask"]

[stages.args]
text = "prompt"
max_length = 512
tokenizer_path = "/workspace/models/t5-small/tokenizer.json"

[[stages]]
type = "model"
model = "encoder"
inputs = { input_ids = "input_ids", attention_mask = "attention_mask" }
outputs = ["encoder_hidden_states"]

[[stages]]
type = "builtin"
builtin = "generate"
outputs = ["generated_ids"]

[stages.args]
model = "decoder"
encoder_hidden_states = "encoder_hidden_states"
encoder_attention_mask = "attention_mask"
max_new_tokens = 50
start_token_id = 0  # PAD token

# Decode generated tokens to text
[[stages]]
type = "builtin"
builtin = "decode"
outputs = ["generated_text"]

[stages.args]
tokens = "generated_ids"

# Output
[outputs.result]
tensor = "generated_text"
handler = "json"
description = "Generated text (detokenized)"
