# Stable Diffusion Pipeline - Unified Config Format
#
# This demonstrates a complex multi-model pipeline using the unified config.
# The config supports loops for denoising steps and multiple model stages.
#
# Usage:
#   hologram-onnx compile --config sd-unified.toml
#   hologram-onnx run --config sd-unified.toml --prompt "a sunset over mountains"

name = "stable-diffusion"
version = "1.0"
description = "Text-to-image generation with Stable Diffusion"

# Pipeline inputs with types and defaults
[inputs]
prompt = { type = "text", default = "a photo of a cat" }
negative_prompt = { type = "text", default = "" }
steps = { type = "int", default = 50 }
guidance_scale = { type = "float", default = 7.5 }
seed = { type = "int", default = 42 }
width = { type = "int", default = 512 }
height = { type = "int", default = 512 }

# Models in the pipeline
[models]
text_encoder = "models/sd-onnx/text_encoder.onnx"
unet = { path = "models/sd-onnx/unet.onnx", precompiled = "models/sd-onnx/unet.holo" }
vae_decoder = "models/sd-onnx/vae_decoder.onnx"

# Compilation settings for large models
[compiler]
weight_threshold = 4096
enable_partitioning = true
partition_size = 1000
decompose_conv2d = true
decompose_pooling = true
memory_budget = 8192  # 8 GB

# Execution stages
[[stages]]
model = "text_encoder"
inputs = { input_ids = "tokenize(prompt)" }
outputs = ["text_embeddings"]

[[stages]]
model = "text_encoder"
inputs = { input_ids = "tokenize(negative_prompt)" }
outputs = ["uncond_embeddings"]

[[stages]]
builtin = "randn"
args = { shape = [1, 4, "height/8", "width/8"], seed = "seed" }
outputs = ["latent"]

[[stages]]
over = "range(steps)"
as = "step"

[[stages.stages]]
model = "unet"
inputs = { sample = "latent", timestep = "step", encoder_hidden_states = "text_embeddings" }
outputs = ["noise_pred"]

[[stages]]
model = "vae_decoder"
inputs = { latent_sample = "latent" }
outputs = ["image"]

# Output handlers
[outputs]
result = { tensor = "image", handler = "image" }
