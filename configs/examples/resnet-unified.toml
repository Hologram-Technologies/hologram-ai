# ResNet-50 Image Classifier - Unified Config
#
# Demonstrates a single-model config with explicit input/output specifications
# and compiler settings for a larger model.
#
# Usage:
#   hologram-onnx compile --config resnet-unified.toml
#   hologram-onnx run --config resnet-unified.toml --input cat.jpg

name = "resnet50-classifier"
version = "1.0"
description = "ResNet-50 image classification"

[inputs]
image = { type = "image", shape = [1, 3, 224, 224] }

[models]
resnet = "models/resnet50.onnx"

[compiler]
weight_threshold = 8192
decompose_conv2d = true
decompose_pooling = true

[outputs]
classes = { tensor = "output", handler = "json" }
