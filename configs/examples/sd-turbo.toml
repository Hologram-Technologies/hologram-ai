# Stable Diffusion Turbo Pipeline Configuration
#
# This config demonstrates image generation with the SD-Turbo model.
# Requires: hologram-onnx with --features image-output

[pipeline]
name = "sd-turbo"
version = "1.0"
description = "Stable Diffusion Turbo - Fast text-to-image generation in 1-4 steps"

[pipeline.execution]
inputs = ["prompt", "num_inference_steps", "guidance_scale"]
outputs = ["image"]

# Image output handler configuration
[pipeline.execution.output_handlers.image]
type = "image"
output = "sample"                  # VAE decoder output tensor name
format = "rgb"                     # RGB image (3 channels)
layout = "NCHW"                    # Channels-first: [N, C, H, W]
value_range = "neg_one_one"        # VAE outputs in [-1, 1] range

# Multi-stage pipeline (optional - for separate ONNX models)
[[pipeline.execution.stages]]
name = "text_encoder"
model = "text_encoder.holo"
inputs = { input_ids = "tokenized_prompt" }
outputs = ["text_embeddings"]

[[pipeline.execution.stages]]
name = "unet"
model = "unet.holo"
inputs = {
    sample = "latents",
    timestep = "timestep",
    encoder_hidden_states = "text_embeddings"
}
outputs = ["noise_pred"]

[[pipeline.execution.stages]]
name = "vae_decoder"
model = "vae_decoder.holo"
inputs = { latent_sample = "denoised_latents" }
outputs = ["sample"]
