# T5 Simple Test Configuration
#
# Quick test of T5 models with minimal configuration
#
# Usage:
#   cargo run --features text-output -- run \
#     --config configs/examples/t5-simple.toml \
#     -i prompt="Tell me a joke"

name = "T5 Simple Test"
description = "Minimal T5 configuration for testing"

# Models (paths relative to config file location)
[models.encoder]
path = "../../models/t5-small/encoder_model.onnx"
precompiled = "../../models/t5-small/compiled/encoder.holo"

[models.decoder]
path = "../../models/t5-small/decoder_model.onnx"
precompiled = "../../models/t5-small/compiled/decoder.holo"

# Inputs
# Simple string input (just default value)
[inputs]
prompt = "Translate English to French: Hello, how are you?"

# Simple pipeline - just demonstrates model loading
[[stages]]
type = "builtin"
builtin = "tokenize"
outputs = ["tokens"]

[stages.args]
text = "prompt"
max_length = 128

# Outputs
[outputs.result]
tensor = "tokens"
handler = "json"
description = "Tokenized output"

# Compiler settings
[compiler]
enable_partitioning = true
partition_size = 200
