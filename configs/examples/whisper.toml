# Whisper Speech-to-Text Pipeline Configuration
#
# This config demonstrates audio transcription with OpenAI Whisper.
# Requires: hologram-onnx with --features text-output

[pipeline]
name = "whisper-base"
version = "1.0"
description = "Whisper Base - Speech-to-text transcription"

[pipeline.execution]
inputs = ["audio_features"]
outputs = ["transcription"]

# Text output handler configuration
[pipeline.execution.output_handlers.transcription]
type = "text"
output = "output_ids"                      # Decoder output token IDs
tokenizer_path = "tokenizer.json"          # Whisper tokenizer
skip_special_tokens = true                 # Skip <|startoftranscript|>, <|endoftext|>, etc.

# Multi-stage pipeline
[[pipeline.execution.stages]]
name = "encoder"
model = "encoder.holo"
inputs = { input_features = "mel_spectrogram" }
outputs = ["encoder_hidden_states"]

[[pipeline.execution.stages]]
name = "decoder"
model = "decoder.holo"
inputs = {
    input_ids = "decoder_input_ids",
    encoder_hidden_states = "encoder_hidden_states"
}
outputs = ["output_ids"]
