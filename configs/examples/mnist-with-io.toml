# MNIST Classifier - With Input/Output Config
#
# Demonstrates specifying input type and default values.
#
# Usage:
#   hologram-onnx run --config mnist-with-io.toml
#   hologram-onnx run --config mnist-with-io.toml --input other-digit.png

model = "mnist.onnx"
input = { type = "image", default = "digit.png" }
output = "classes"
