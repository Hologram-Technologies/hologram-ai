name = "Test T5 Encoder"
description = "Quick test of encoder execution"

[models.encoder]
path = "../models/t5-small/encoder_model.onnx"
precompiled = "../models/t5-small/compiled/encoder.holo"

[inputs]
prompt = "Hello world"

# Tokenize
[[stages]]
type = "builtin"
builtin = "tokenize"
outputs = ["input_ids", "attention_mask"]

[stages.args]
text = "prompt"
max_length = 128
tokenizer_path = "../models/t5-small/tokenizer.json"

# Run encoder
[[stages]]
type = "model"
model = "encoder"
outputs = ["encoder_hidden_states"]

[stages.inputs]
input_ids = "input_ids"
attention_mask = "attention_mask"

# Output
[outputs.result]
tensor = "encoder_hidden_states"
handler = "json"
description = "Encoder output"

[compiler]
enable_partitioning = true
partition_size = 200

[runtime]
device = "cpu"
num_threads = 4
