name: Build the hologram-ai site
description: Build the hologram-ai browser GUI into a static directory.
inputs:
  out-dir:
    description: The directory the assembled site is written to
    required: false
    default: _site

runs:
  using: composite
  steps:
    - name: Install protoc
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
    - name: Rust toolchain + wasm target
      shell: bash
      run: |
        rustup toolchain install stable --profile minimal
        rustup target add wasm32-unknown-unknown
        # Nightly + rust-src for the MULTI-THREADED wasm build (ADR-0018): its
        # `-Z build-std` rebuilds std with atomics. Pinned so the gate compiles
        # what the deploy compiles (gate == CI == deploy; the dark-gates memory).
        rustup toolchain install "$HAI_WASM_THREADS_NIGHTLY" --profile minimal --component rust-src
        rustup target add wasm32-unknown-unknown --toolchain "$HAI_WASM_THREADS_NIGHTLY"
      env:
        HAI_WASM_THREADS_NIGHTLY: nightly-2026-07-09
    - name: Install wasm-pack
      shell: bash
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    - uses: pnpm/action-setup@v4
      with: { version: 10 }
    - uses: actions/setup-node@v4
      with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
    - name: Build wasm (single-threaded fallback)
      shell: bash
      run: wasm-pack build crates/hologram-ai-wasm --target web --out-dir ../../apps/web/src/wasm --release
    - name: Build wasm (multi-threaded pool)
      shell: bash
      # Populates apps/web/src/wasm-threads/. Runs AFTER the wasm-pack build so
      # the version-matched wasm-bindgen is already in the wasm-pack cache. The
      # script self-verifies the artifact (pool exports, no env futex imports).
      run: bash apps/web/scripts/build-wasm-threads.sh
      env:
        HAI_WASM_THREADS_NIGHTLY: nightly-2026-07-09
    - name: Build web bundle
      working-directory: apps/web
      shell: bash
      env:
        VITE_BASE: /hologram-ai/
        npm_config_verify_deps_before_run: "false"
      run: |
        pnpm install --frozen-lockfile
        pnpm exec tsc -b
        pnpm exec vite build
    - name: Move artifacts
      shell: bash
      run: |
        mkdir -p ${{ inputs.out-dir }}
        cd apps/web/dist/extension
        zip -r ../extension.zip .
        cd ..
        rm -rf extension
        cd ../../..
        cp -a apps/web/dist/. ${{ inputs.out-dir }}/
