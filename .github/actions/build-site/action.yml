name: Build the hologram-ai site
description: Build the hologram-ai browser GUI into a static directory.
inputs:
  out-dir:
    description: The directory the assembled site is written to
    required: false
    default: _site

runs:
  using: composite
  steps:
    - name: Install protoc
      shell: bash
      run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
    - name: Rust toolchain + wasm target
      shell: bash
      run: |
        rustup toolchain install stable --profile minimal
        rustup target add wasm32-unknown-unknown
    - name: Install wasm-pack
      shell: bash
      run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
    - uses: pnpm/action-setup@v4
      with: { version: 10 }
    - uses: actions/setup-node@v4
      with: { node-version: 22, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }
    - name: Build wasm
      shell: bash
      run: wasm-pack build crates/hologram-ai-wasm --target web --out-dir ../../apps/web/src/wasm --release
    - name: Build web bundle
      working-directory: apps/web
      shell: bash
      env:
        VITE_BASE: /hologram-ai/
        npm_config_verify_deps_before_run: "false"
      run: |
        pnpm install --frozen-lockfile
        pnpm exec tsc -b
        pnpm exec vite build
    - name: Move artifacts
      shell: bash
      run: |
        mkdir -p ${{ inputs.out-dir }}
        cd apps/web/dist/extension
        zip -r ../extension.zip .
        cd ..
        rm -rf extension
        cd ../../..
        cp -a apps/web/dist/. ${{ inputs.out-dir }}/
