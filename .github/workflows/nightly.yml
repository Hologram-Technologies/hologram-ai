name: Nightly Conformance

# Live-model EE classes (EE-1 ORT mini-transformer; EE-2/EE-3
# SmolLM2-135M-Instruct generation + ORT logit parity; Qwen2-0.5B-Instruct
# coherence). These need real model downloads and so are kept out of the
# per-PR CI. Run nightly and on manual dispatch.
#
# Auth model: same App-token + git `insteadOf` setup as ci.yml — no sibling
# clone, cargo fetches hologram-* via its own git CLI.

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  HOLOGRAM_AI_LIVE: "1"

jobs:
  live-models:
    name: Live model EE (SmolLM2 + Qwen2 + ORT)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token (hologram read access)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Hologram-Technologies
          repositories: hologram

      - name: Configure git auth for cargo
        run: |
          git config --global \
            url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Hologram-Technologies/".insteadOf \
            "https://github.com/Hologram-Technologies/"

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: nightly

      - name: Install ONNX Runtime (for EE-1)
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.18.1/onnxruntime-linux-x64-1.18.1.tgz
          tar xzf onnxruntime-linux-x64-1.18.1.tgz
          echo "ORT_DYLIB_PATH=$(pwd)/onnxruntime-linux-x64-1.18.1/lib/libonnxruntime.so" >> "$GITHUB_ENV"

      # SmolLM2-135M-Instruct ≈ 270 MB on disk. The ONNX export uses split
      # external data (`model.onnx` + `model.onnx_data`) and a HuggingFace
      # tokenizer.json alongside it.
      - name: Download SmolLM2-135M-Instruct
        run: |
          mkdir -p models/smollm2-135m
          BASE="https://huggingface.co/HuggingFaceTB/SmolLM2-135M-Instruct/resolve/main/onnx"
          wget -q -O models/smollm2-135m/model.onnx       "$BASE/model.onnx"
          wget -q -O models/smollm2-135m/model.onnx_data  "$BASE/model.onnx_data" || true
          wget -q -O models/smollm2-135m/tokenizer.json \
            "https://huggingface.co/HuggingFaceTB/SmolLM2-135M-Instruct/resolve/main/tokenizer.json"

      # Qwen2-0.5B-Instruct ≈ 950 MB on disk.
      - name: Download Qwen2-0.5B-Instruct
        run: |
          mkdir -p models/Qwen2-0.5B-Instruct
          BASE="https://huggingface.co/onnx-community/Qwen2-0.5B-Instruct/resolve/main/onnx"
          wget -q -O models/Qwen2-0.5B-Instruct/model.onnx       "$BASE/model.onnx"
          wget -q -O models/Qwen2-0.5B-Instruct/model.onnx_data  "$BASE/model.onnx_data" || true
          wget -q -O models/Qwen2-0.5B-Instruct/tokenizer.json \
            "https://huggingface.co/onnx-community/Qwen2-0.5B-Instruct/resolve/main/tokenizer.json"
          wget -q -O models/Qwen2-0.5B-Instruct/config.json \
            "https://huggingface.co/onnx-community/Qwen2-0.5B-Instruct/resolve/main/config.json"

      # EE-1 — mini transformer vs ORT, in-test fixture, no model download.
      - name: ORT conformance (EE-1)
        run: cargo test --release -p hologram-ai-conformance --features=conformance

      # EE-2/EE-3 — SmolLM2-135M-Instruct generation + ORT logit parity.
      # Asserts "The capital of France is" → "Paris" (the EE-3 ORT-verified
      # continuation).
      - name: SmolLM2 generation (EE-2/EE-3)
        run: cargo test --release -p hologram-ai-conformance --features=onnx-spec --test real_model_generation -- --nocapture

      # Qwen2-0.5B-Instruct coherence + determinism (exercises code paths
      # SmolLM2 does not — GQA 7:1, native logits output, full rank-3
      # norm-projection chain).
      - name: Qwen2 generation
        run: cargo test --release -p hologram-ai-conformance --features=onnx-spec --test real_model_generation_qwen2 -- --nocapture
