name: Deploy web GUI to GitHub Pages

# Builds the hologram-ai browser GUI (ADR-0017): compile the real runtime core to
# WebAssembly, bundle the React app, publish the static site to Pages.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # The web build needs the sibling hologram repo (path dependency).
        # Adjust `repository`/`ref` to your hologram remote, or vendor it.
      - name: Check out hologram (sibling path dependency)
        uses: actions/checkout@v4
        with:
          repository: uor-framework/hologram
          path: ../hologram
          # token: ${{ secrets.HOLOGRAM_REPO_TOKEN }}  # if private

      - name: Rust toolchain + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: apps/web/pnpm-lock.yaml }

      - name: Build wasm (no parallel — wasm32 is single-threaded)
        run: wasm-pack build crates/hologram-ai-wasm --target web --out-dir ../../apps/web/src/wasm --release

      - name: Build web bundle
        working-directory: apps/web
        env:
          VITE_BASE: /hologram-ai/
          # Don't let pnpm's pre-run deps check fail on build-script approval.
          npm_config_verify_deps_before_run: "false"
        run: |
          pnpm install --no-frozen-lockfile
          pnpm rebuild esbuild
          pnpm exec tsc -b
          pnpm exec vite build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: apps/web/dist }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
