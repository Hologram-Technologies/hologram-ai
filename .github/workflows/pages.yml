name: Deploy web GUI to GitHub Pages

# Builds the hologram-ai browser GUI (ADR-0017): compile the real runtime core to
# WebAssembly, bundle the React app, publish the static site to Pages.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "apps/web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# One in-flight deployment; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://hologram-technologies.github.io/hologram-ai/
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token (hologram read access)
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: Hologram-Technologies
          repositories: hologram

      - name: Build site
        uses: ./.github/actions/build-site
        with:
          app-token: ${{ steps.app-token.outputs.token }}
          out-dir: _site

      - name: Deploy to the gh-pages root (production)
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          branch: gh-pages
          clean: true
          commit-message: "deploy: web GUI → gh-pages root (${{ github.sha }})"
