name: Deploy web GUI to GitHub Pages

# Builds the hologram-ai browser app (ADR-0017) and publishes it to Pages.
# The deployment REQUIRES the hermetic browser journey green (dictionary row
# `deployment-gate`): no publish without download → compile → materialize →
# run → three-message handshake passing in real Chromium.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deployment; don't cancel a running one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # The same journey gate as ci.yml, run on the exact commit being deployed.
  journey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Nightly + rust-src for the multi-threaded wasm build (ADR-0018)
        run: |
          rustup toolchain install "$HAI_WASM_THREADS_NIGHTLY" --profile minimal --component rust-src
          rustup target add wasm32-unknown-unknown --toolchain "$HAI_WASM_THREADS_NIGHTLY"
        env:
          HAI_WASM_THREADS_NIGHTLY: nightly-2026-07-09
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: journey
      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Browser decode kernels in-wasm (wasm-pack test --node)
        # Gates the deploy: runs the REAL substrate decode kernels compiled to
        # the wasm target the browser ships (bare κ119/κ120 fused step + the
        # resident-KV carry/steal at production head_dim 128 + the legacy-decode
        # guard). `cargo check` only proves it builds; this proves it RUNS.
        run: wasm-pack test --node crates/hologram-ai-wasm
      - name: Build wasm binding (single-threaded fallback)
        working-directory: apps/web
        run: pnpm wasm
      - name: Build wasm binding (multi-threaded pool)
        working-directory: apps/web
        run: pnpm wasm:threads
        env:
          HAI_WASM_THREADS_NIGHTLY: nightly-2026-07-09
      - name: Install Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Web unit tests
        working-directory: apps/web
        run: pnpm test
      - name: Browser BDD (hermetic journey + handshake)
        working-directory: apps/web
        run: pnpm bdd
      - name: Live real-model gate (real HuggingFace Qwen2.5-0.5B on the deploy bundle)
        # The gate that would have caught the deployed real-model crash: a REAL,
        # POPULAR model (Qwen/Qwen2.5-0.5B-Instruct — the Qwen2.5 family users
        # actually run, not a 135M smoke) downloaded from real HuggingFace THROUGH
        # the built app, int8-quantized, compiled, and decoded in real Chromium —
        # asserting a coherent, error-free completion. It runs against a local
        # preview of the SAME bundle this workflow deploys, so a real-model break
        # BLOCKS the deploy instead of reaching users. The hermetic journey proves
        # the deployed SHAPE; this proves real weights + tokenizer + int8 + the
        # fused decode end to end before publish. The scheduled architecture matrix
        # (architectures.yml) runs Qwen2.5-1.5B — the exact head_dim-128 staged
        # shape that trapped `unreachable` on v0.9.0 and now decodes on v0.10.0.
        # PARAMETRIC: swap HAI_PROBE_MODEL for any architecture; the app derives
        # staging/residency/quant automatically.
        working-directory: apps/web
        env:
          HAI_PROBE_MODEL: '{"hfId":"Qwen/Qwen2.5-0.5B-Instruct","displayName":"Qwen2.5 0.5B Instruct","size":"0.5B","quantize":"int8"}'
          HAI_PROBE_PROMPT: "The capital of France is"
          HAI_PROBE_EXPECT: "paris"
          # Bound the wait so a stalled model fails cleanly rather than hanging the
          # deploy (0.5B reaches Ready in ~30s locally; a CI runner, a few minutes).
          HAI_PROBE_DL_TIMEOUT_MS: "900000"
          HAI_PROBE_GEN_TIMEOUT_MS: "300000"
        run: |
          pnpm build
          pnpm exec vite preview --host 127.0.0.1 --port 4173 --strictPort &
          PREVIEW_PID=$!
          trap 'kill $PREVIEW_PID 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:4173/hologram-ai/ >/dev/null && break
            sleep 1
          done
          HAI_DEPLOY_URL=http://127.0.0.1:4173/hologram-ai/ node bdd/probe-deployed-live.mjs
      - name: Pool registration witness (Node worker_threads)
        working-directory: apps/web
        run: node bdd/probe-pool-registration.mjs
      - name: Multi-threaded pool browser probe (isolated + byte-exact fixture)
        working-directory: apps/web
        run: node bdd/probe-threads-local.mjs

  build:
    needs: journey
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site
        uses: ./.github/actions/build-site
        with:
          out-dir: _site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: './_site'

  # Deploy is gated `journey → build → deploy`, and `journey` now includes the
  # real-model gate (a real HuggingFace model decoded on the deploy bundle), so
  # a broken real model blocks publish. RECOMMENDED (repo setting, not
  # expressible here): add a required-reviewer protection rule to the
  # `github-pages` environment (Settings → Environments) so main→Pages is a
  # deliberate promotion, not an automatic push. GitHub Pages has no canary, so
  # the pre-deploy gates above are the last line before users.
  deploy:
    needs: [journey, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

  # Post-deploy: verify the LIVE instance is cross-origin-isolated, i.e. the
  # multi-threaded decode pool (ADR-0018) actually engages in production. On
  # GitHub Pages this rests entirely on the coi-serviceworker (Pages sends no
  # COOP/COEP), and NO other gate exercises the SW-on-real-Pages path — the
  # pre-deploy real-model gate runs against a vite preview whose headers bypass
  # the SW. If isolation silently breaks, every user's decode drops to
  # single-threaded; this turns the workflow red instead.
  isolation-smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Verify the deployed instance is cross-origin-isolated (pool can engage)
        working-directory: apps/web
        env:
          HAI_URL: ${{ needs.deploy.outputs.page_url }}
        run: node bdd/probe-cross-origin-isolation.mjs
