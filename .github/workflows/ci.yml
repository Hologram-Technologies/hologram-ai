      - name: Clone hologram dependencies
        uses: actions/checkout@v4
        with:
          repository: UOR-Foundation/hologram
          path: hologram-repo
          token: ${{ secrets.HOLOGRAM_PAT }}

      - name: Clone hologram-backend
        uses: actions/checkout@v4
        with:
          repository: UOR-Foundation/hologram-backend
          path: hologram-backend-repo
          token: ${{ secrets.HOLOGRAM_PAT }}

      - name: Setup hologram at /hologram
        run: |
          sudo mv hologram-repo /hologram
          sudo mkdir -p /hologram/crates
          sudo mv hologram-backend-repo /hologram/crates/backend

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Download MNIST model
        run: |
          mkdir -p crates/hologram-ai-onnx/tests/fixtures
          curl -L https://github.com/onnx/models/raw/main/validated/vision/classification/mnist/model/mnist-12.onnx \
            -o crates/hologram-ai-onnx/tests/fixtures/mnist-12.onnx

      - name: Run integration tests
        run: cargo test -p hologram-ai-onnx --test '*'
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  # Build release binary
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [test-onnx, test-common, test-main]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure git for private repos
        run: |
          # Configure git credential helper with token
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          # Rewrite SSH URLs to HTTPS (must match exact prefix patterns)
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          # Configure cargo to use git CLI so it respects git config
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Clone hologram dependencies
        uses: actions/checkout@v4
        with:
          repository: UOR-Foundation/hologram
          path: hologram-repo
          token: ${{ secrets.HOLOGRAM_PAT }}

      - name: Clone hologram-backend
        uses: actions/checkout@v4
        with:
          repository: UOR-Foundation/hologram-backend
          path: hologram-backend-repo
          token: ${{ secrets.HOLOGRAM_PAT }}

      - name: Setup hologram at /hologram
        run: |
          sudo mv hologram-repo /hologram
          sudo mkdir -p /hologram/crates
          sudo mv hologram-backend-repo /hologram/crates/backend

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release
        run: cargo build --release -p hologram-ai
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  # Summary job that depends on all others
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [check, test-onnx, test-common, test-main, docs, integration, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.check.result }}" != "success" ] || \
             [ "${{ needs.test-onnx.result }}" != "success" ] || \
             [ "${{ needs.test-common.result }}" != "success" ] || \
             [ "${{ needs.test-main.result }}" != "success" ] || \
             [ "${{ needs.docs.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
