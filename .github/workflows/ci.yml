name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Quick checks that fail fast
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Configure git for private repos
        run: |
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (libraries)
        run: cargo clippy --lib -p hologram-ai -p hologram-ai-onnx -p hologram-ai-common -p hologram-ai-gguf -p hologram-ai-safetensors -- -D warnings

  # Test each crate independently to avoid linker memory issues
  test-onnx:
    name: Test hologram-ai-onnx
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure git for private repos
        run: |
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-onnx-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-onnx-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run -p hologram-ai-onnx --lib --no-fail-fast
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  test-common:
    name: Test hologram-ai-common
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure git for private repos
        run: |
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-common-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-common-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run -p hologram-ai-common --lib --no-fail-fast
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  test-main:
    name: Test hologram-ai
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure git for private repos
        run: |
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-main-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-main-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run tests
        run: cargo nextest run -p hologram-ai --lib --no-fail-fast
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  # Documentation generation
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure git for private repos
        run: |
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-docs-

      - name: Generate documentation
        run: cargo doc --no-deps
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true
          RUSTDOCFLAGS: "-D warnings"

  # Lightweight integration tests using mock models (no downloads required)
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-onnx, test-common, test-main]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure git for private repos
        run: |
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run lightweight integration tests
        run: cargo nextest run -p hologram-ai-onnx --test lightweight_tests --no-fail-fast
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  # Build release binary
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [test-onnx, test-common, test-main]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Configure git for private repos
        run: |
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-

      - name: Build release
        run: cargo build --release -p hologram-ai
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  # Summary job that depends on all others
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [check, test-onnx, test-common, test-main, docs, integration, build]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.check.result }}" != "success" ] || \
             [ "${{ needs.test-onnx.result }}" != "success" ] || \
             [ "${{ needs.test-common.result }}" != "success" ] || \
             [ "${{ needs.test-main.result }}" != "success" ] || \
             [ "${{ needs.docs.result }}" != "success" ] || \
             [ "${{ needs.integration.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All CI checks passed!"
