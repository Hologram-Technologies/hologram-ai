      - name: Configure git for private repos
        run: |
          # Configure git credential helper with token
          echo "https://x-access-token:${{ secrets.HOLOGRAM_PAT }}@github.com" >> ~/.git-credentials
          git config --global credential.helper 'store --file ~/.git-credentials'
          # Rewrite SSH URLs to HTTPS (must match exact prefix patterns)
          git config --global --add url."https://github.com/".insteadOf "git@github.com:"
          git config --global --add url."https://github.com/".insteadOf "ssh://git@github.com/"
          # Configure cargo to use git CLI so it respects git config
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Clone hologram dependencies
        uses: actions/checkout@v4
        with:
          repository: UOR-Foundation/hologram
          path: hologram-repo
          token: ${{ secrets.HOLOGRAM_PAT }}

      - name: Clone hologram-backend
        uses: actions/checkout@v4
        with:
          repository: UOR-Foundation/hologram-backend
          path: hologram-backend-repo
          token: ${{ secrets.HOLOGRAM_PAT }}

      - name: Setup hologram at /hologram
        run: |
          sudo mv hologram-repo /hologram
          sudo mkdir -p /hologram/crates
          sudo mv hologram-backend-repo /hologram/crates/backend

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-onnx-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-onnx-

      - name: Run tests
        run: cargo test -p hologram-ai-onnx --lib
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

  test-common:
    name: Test hologram-ai-common
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
