          # Configure cargo to use git CLI so it respects git config
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [net]
          git-fetch-with-cli = true
          EOF

      - name: Clone hologram dependencies
        uses: actions/checkout@v4
        with:
          repository: UOR-Foundation/hologram
          path: hologram-repo
          token: ${{ secrets.HOLOGRAM_PAT }}

      - name: Clone hologram-backend
        uses: actions/checkout@v4
        with:
