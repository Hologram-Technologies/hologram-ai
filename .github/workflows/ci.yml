name: ci

# The V&V gate set — mirrors `just vv` job-for-job (docs/architecture/ARCHITECTURE.md §5).
# All substrate repos are public: cargo fetches the pinned git deps directly.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  # fmt, lint, docs, the whole test suite (unit + integration + the honesty
  # meta-gate + the κ-materialization e2e witness), the default-lane BDD run,
  # oracle integrity, the ledger, and the anti-hardcode gate.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gate
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: doc
        run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: test (unit + integration + honesty + materialize e2e)
        run: cargo test --workspace
      - name: bdd (default lane — fails on any skipped/undefined step)
        run: cargo test -p hologram-ai-conformance --test bdd
        env:
          HOLOGRAM_AI_BDD_LANE: default
      - name: oracle integrity
        run: cargo run -q -p xtask -- oracle-verify
      - name: conformance ledger
        run: cargo run -q -p xtask -- report
      - name: anti-hardcode
        run: ./scripts/anti-hardcode.sh

  # The substrate-contract witnesses in their isolated binaries (ZA needs the
  # counting allocator to own the process).
  structural:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: structural
      - name: structural witnesses (ZA/ZM/CE/CF/LW/IM)
        run: |
          cargo test --release -p hologram-ai-conformance --features=structural \
            --test structural_ce --test structural_za --test structural_zm \
            --test structural_cf --test structural_lw --test structural_im

  # External-authority execution parity: ONNX Runtime linked as the reference.
  ort:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ort
      - name: Install ONNX Runtime (pinned v1.18.1)
        run: |
          curl -fsSL -o /tmp/ort.tgz \
            https://github.com/microsoft/onnxruntime/releases/download/v1.18.1/onnxruntime-linux-x64-1.18.1.tgz
          tar -xzf /tmp/ort.tgz -C /tmp
          echo "ORT_DYLIB_PATH=/tmp/onnxruntime-linux-x64-1.18.1/lib/libonnxruntime.so" >> "$GITHUB_ENV"
      - name: bdd (ort lane)
        run: cargo test -p hologram-ai-conformance --features conformance --test bdd
        env:
          HOLOGRAM_AI_BDD_LANE: ort
      - name: conformance (EE — execution parity vs ORT)
        run: cargo test --release -p hologram-ai-conformance --features=conformance

  # The runtime core stays no_std-portable; the browser binding builds for wasm.
  portability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: portability
      - name: runtime core on wasm32
        run: |
          cargo build --target wasm32-unknown-unknown -p hologram-ai-quant
          cargo build --target wasm32-unknown-unknown -p hologram-ai-tokenizer --no-default-features
      - name: runtime core on thumbv7em (bare metal)
        run: |
          cargo build --target thumbv7em-none-eabi -p hologram-ai-quant
          cargo build --target thumbv7em-none-eabi -p hologram-ai-tokenizer --no-default-features
      - name: browser binding on wasm32
        run: cargo check --target wasm32-unknown-unknown -p hologram-ai-wasm

  # Every pinned upstream is live (online).
  pin-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gate
      - name: pin-check
        run: cargo run -q -p xtask -- pin-check

  # The measured probes for `open` rows — reported, never gating.
  target-probes:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: gate
      - name: bdd (target lane — measurements)
        run: cargo test -p hologram-ai-conformance --test bdd -- --nocapture
        env:
          HOLOGRAM_AI_BDD_LANE: target

  # The hermetic browser journey: download → compile → materialize → run →
  # three-message handshake, in real Chromium. The same job name gates the
  # Pages deployment (dictionary row `deployment-gate`).
  journey:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Nightly + rust-src for the multi-threaded wasm build (ADR-0018)
        run: |
          rustup toolchain install "$HAI_WASM_THREADS_NIGHTLY" --profile minimal --component rust-src
          rustup target add wasm32-unknown-unknown --toolchain "$HAI_WASM_THREADS_NIGHTLY"
        env:
          HAI_WASM_THREADS_NIGHTLY: nightly-2026-07-09
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: journey
      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install web deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Build wasm binding (single-threaded fallback)
        working-directory: apps/web
        run: pnpm wasm
      - name: Build wasm binding (multi-threaded pool)
        working-directory: apps/web
        run: pnpm wasm:threads
        env:
          HAI_WASM_THREADS_NIGHTLY: nightly-2026-07-09
      - name: Install Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Web unit tests
        working-directory: apps/web
        run: pnpm test
      - name: Browser BDD (hermetic journey + handshake)
        working-directory: apps/web
        run: pnpm bdd
      - name: Pool registration witness (Node worker_threads)
        working-directory: apps/web
        run: node bdd/probe-pool-registration.mjs
      - name: Multi-threaded pool browser probe (isolated + byte-exact fixture)
        working-directory: apps/web
        run: node bdd/probe-threads-local.mjs
